---
layout: default
---
<article class="post">
    <div class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="post-meta">
            {% if page.category %}
            <span class="post-category">{{ page.category }}</span>
            {% endif %}
            <span>{{ page.date | date: "%Y年%m月%d日" }}</span>
        </div>
    </div>
    
    <div class="post-content">
        {{ content }}
    </div>
</article>
