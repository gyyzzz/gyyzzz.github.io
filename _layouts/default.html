<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fafafa;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0 40px;
            text-align: center;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 1.1em; }
        header a { color: white; text-decoration: none; }
        
        nav { background: #fff; border-bottom: 1px solid #eee; padding: 15px 0; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 30px; }
        nav a { color: #666; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #667eea; }
        
        /* Main Content */
        main { padding: 40px 0; }
        
        /* Post List */
        .post-list { list-style: none; }
        .post-item {
            background: #fff;
            border-radius: 8px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .post-item h2 { margin-bottom: 10px; }
        .post-item h2 a { color: #333; text-decoration: none; }
        .post-item h2 a:hover { color: #667eea; }
        .post-meta { color: #888; font-size: 0.9em; margin-bottom: 12px; }
        .post-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        .post-excerpt { color: #555; line-height: 1.7; }
        
        /* Post Page */
        .post-header { text-align: center; margin-bottom: 40px; }
        .post-header h1 { font-size: 2.2em; margin-bottom: 15px; }
        .post-content {
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .post-content h2 { margin: 30px 0 15px; color: #333; }
        .post-content h3 { margin: 25px 0 12px; color: #444; }
        .post-content p { margin-bottom: 16px; line-height: 1.8; }
        .post-content pre {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }
        .post-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .post-content pre code { background: none; padding: 0; }
        .post-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }
        .post-content ul, .post-content ol { margin: 16px 0 16px 30px; }
        .post-content li { margin-bottom: 8px; }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 30px 0;
            color: #888;
            border-top: 1px solid #eee;
            margin-top: 40px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8em; }
            .post-content { padding: 25px; }
            nav ul { gap: 15px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p>{{ site.description }}</p>
        </div>
    </header>
    
    <nav>
        <div class="container">
            <ul>
                <li><a href="{{ '/' | relative_url }}">首页</a></li>
                <li><a href="{{ '/categories/llm-dynamics' | relative_url }}">LLM动态</a></li>
                <li><a href="{{ '/categories/tutorials' | relative_url }}">实战教程</a></li>
                <li><a href="{{ '/categories/paper-reading' | relative_url }}">论文解读</a></li>
                <li><a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container">
        {{ content }}
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }} · 由 AI 助手驱动</p>
        </div>
    </footer>
</body>
</html>
